name: cleanup-runner-endpoints

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}

jobs:
  cleanup-runner-endpoints:
    runs-on: self-hosted
    environment: ${{ inputs.environment }}

    defaults:
      run:
        working-directory: src/infrastructure

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        env:
          AZ_TERRAFORM_BACKEND_STORAGEACCOUNT: ${{ vars.AZ_TERRAFORM_BACKEND_STORAGEACCOUNT }}
          AZ_TERRAFORM_BACKEND_RESOURCEGROUP: ${{ vars.AZ_TERRAFORM_BACKEND_RESOURCEGROUP }}
          AZ_BACKEND_CONTAINER_NAME: ${{ inputs.environment }}
          AZ_MAIN_STATE_FILE_KEY: "terraform.tfstate"
        run: |
          terraform init \
            -backend-config="storage_account_name=${AZ_TERRAFORM_BACKEND_STORAGEACCOUNT}" \
            -backend-config="container_name=${AZ_BACKEND_CONTAINER_NAME}" \
            -backend-config="key=${AZ_MAIN_STATE_FILE_KEY}" \
            -backend-config="resource_group_name=${AZ_TERRAFORM_BACKEND_RESOURCEGROUP}"

      - name: Destroy runner Private Endpoints
        # Runner PEs (kv_runner_pe, data_storage_runner_pe) are only needed during terraform apply
        # to allow the GitHub runner to reach private resources (Key Vault secrets, Storage tables).
        # Once the full deployment is complete, they serve no purpose and are destroyed to save costs
        # (~$15/month per environment).
        # On the next deployment, Terraform will recreate them automatically before they are needed.
        env:
          AZ_OWNER_OBJECT_ID: ${{ secrets.AZ_OWNER_OBJECT_ID }}
        run: |
          terraform destroy \
            -target=azurerm_private_endpoint.kv_runner_pe \
            -target=azurerm_private_endpoint.data_storage_runner_pe \
            -var-file=environments/${{ inputs.environment }}.tfvars \
            -var="keyvault_administrator_object_id=${AZ_OWNER_OBJECT_ID}" \
            -var="telegram_bot_token=${{ secrets.TELEGRAM_BOT_TOKEN }}" \
            -var="telegram_bot_secret_header=${{ secrets.TELEGRAM_BOT_SECRET_HEADER }}" \
            -auto-approve
